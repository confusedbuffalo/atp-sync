name: PR Merged

on:
    pull_request_target:
        types: [closed]

jobs:
    on-merge:
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            actions: write
        steps:
            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.APP_PRIVATE_KEY }}
                  permission-contents: 'write'

            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  ref: main

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x

            - name: Install dependencies
              run: npm ci

            - name: Fix spider files and format code
              run: |
                  node src/validate_spiders.js --fix
                  npm run format

            - name: Commit and push changes
              run: |
                  if [ -n "$(git status --porcelain)" ]; then
                    git config --global user.name 'github-actions[bot]'
                    git config --global user.email 'github-actions[bot]@users.noreply.github.com'
                    git add .
                    git commit -m "chore: auto-fix spider files and format code"
                    git push origin main
                  fi

            - name: Check for preview-request label
              id: check-label
              run: |
                  if echo '${{ toJson(github.event.pull_request.labels) }}' | jq -e '.[] | select(.name == "preview-request")' > /dev/null; then
                    echo "has_label=true" >> $GITHUB_OUTPUT
                  else
                    echo "has_label=false" >> $GITHUB_OUTPUT
                  fi

            - name: Add awaiting-preview-run label
              if: steps.check-label.outputs.has_label == 'true'
              uses: actions/github-script@v9
              with:
                  script: |
                      github.rest.issues.addLabels({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        labels: ['awaiting-preview-run']
                      })
