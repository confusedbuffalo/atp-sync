name: PR Validation

on:
    pull_request:
        paths:
            - 'spiders_auto.json'
            - 'spiders_preview.json'

jobs:
    validate:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x

            - name: Install dependencies
              run: npm ci

            - name: Run validation script
              run: node src/validate_spiders.js
              env:
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}

            - name: Check for pr_comment.md
              if: always()
              id: comment-check
              run: |
                  if [ -f pr_comment.md ]; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            - name: Post PR comment
              if: always() && steps.comment-check.outputs.exists == 'true'
              uses: step-security/actions-comment-pull-request@v3
              with:
                  file-path: pr_comment.md
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  pr-number: ${{ github.event.pull_request.number }}
